<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agenda Editor</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0b0f14;
      color: #e5e5e5;
      padding: 24px;
      margin: 0;
    }

    h1 {
      text-align: center;
      font-weight: 600;
      margin-bottom: 24px;
      color: #f2f2f2;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 4px;
      font-size: 14px;
      color: #ccc;
    }

    input, button {
      font-size: 16px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #2a2f38;
      outline: none;
      background: #151a21;
      color: #f2f2f2;
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: #3c82f6;
      background: #1b2028;
    }

    button {
      background: #2a2f38;
      cursor: pointer;
      font-weight: 500;
    }

    button:hover {
      background: #3c4450;
    }

    #slots {
      margin-top: 20px;
    }

    .slot {
      background: #121821;
      border: 1px solid #1e2734;
      border-radius: 8px;
      padding: 10px;
      margin: 8px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: grab;
      gap: 10px;
      transition: background 0.2s;
    }

    .slot:hover {
      background: #181f29;
    }

    .slot.dragging {
      opacity: 0.6;
      background: #10151b;
    }

    .slot input[type="text"] {
      flex: 1;
    }

    .slot input[type="number"] {
      width: 70px;
      text-align: center;
    }

    .slot button {
      background: transparent;
      border: none;
      color: #888;
      font-size: 18px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .slot button:hover {
      color: #f66;
    }

    #addSlot {
      display: inline-block;
      margin-top: 12px;
      background: #1f2630;
      color: #eee;
      border: 1px solid #2c3540;
    }

    #addSlot:hover {
      background: #2a313d;
    }

    .actions {
      margin-top: 24px;
      text-align: center;
    }

    #saveBtn {
      background: #3c82f6;
      border: none;
      color: white;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(60,130,246,0.3);
    }

    #saveBtn:hover {
      background: #357ae8;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    /* Modal */
    #successModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    #successModal .modal-box {
      background: #121821;
      border: 1px solid #1e2734;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 0 12px rgba(0,0,0,0.5);
    }
    #successModal input {
      background: #0b0f14;
      border: 1px solid #333;
      color: #eee;
      padding: 6px 8px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Agenda Editor</h1>

    <label>Title:</label>
    <input id="title" type="text" placeholder="Enter agenda title" />

    <label>Start Time (UTC):</label>
    <input id="startTime" type="datetime-local" />

    <div id="slots"></div>
    <button id="addSlot">+ Add Slot</button>

    <div class="actions">
      <button id="saveBtn">💾 Save Changes</button>
    </div>
  </div>

  <!-- Success Modal -->
  <div id="successModal">
    <div class="modal-box">
      <h2 style="color:#aef28a; margin-top:0;">✅ Agenda Created</h2>
      <p style="color:#ccc;">Your agenda has been created successfully.<br>You can copy the links below:</p>

      <div style="text-align:left; margin-top:20px;">
        <div style="margin-bottom:16px;">
          <strong>👀 View:</strong>
          <div style="display:flex; gap:8px; margin-top:4px;">
            <input id="viewLink" readonly style="flex:1;">
            <button onclick="copyToClipboard('viewLink')" style="padding:6px 10px; border:none; border-radius:6px; background:#3c82f6; color:#fff; cursor:pointer;">Copy</button>
          </div>
        </div>
        <div>
          <strong>✏️ Admin:</strong>
          <div style="display:flex; gap:8px; margin-top:4px;">
            <input id="adminLink" readonly style="flex:1;">
            <button onclick="copyToClipboard('adminLink')" style="padding:6px 10px; border:none; border-radius:6px; background:#3c82f6; color:#fff; cursor:pointer;">Copy</button>
          </div>
        </div>
      </div>

      <button id="closeModal" style="margin-top:24px; background:#2a2f38; color:#eee; padding:10px 20px; border:none; border-radius:8px; cursor:pointer;">Close</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const key = params.get("key");
    const isNew = params.get("new") === "1";

    let slots = [];

    if (!isNew && (!id || !key)) {
      document.body.innerHTML = "<h2 style='text-align:center;color:#f66'>❌ Missing id or key</h2>";
      throw new Error("Missing id/key");
    }

    async function loadAgenda() {
      if (isNew) {
        document.getElementById("title").value = "New Agenda";
        document.getElementById("startTime").value = new Date().toISOString().slice(0, 16);
        slots = [{ title: "Intro", minutes: 5 }];
        renderSlots();
        return;
      }

      const res = await fetch(`get_agenda.php?id=${id}`);
      if (!res.ok) {
        document.body.innerHTML = "<h2 style='text-align:center;color:#f66'>❌ Agenda not found</h2>";
        return;
      }
      const data = await res.json();
      document.getElementById("title").value = data.title;
      document.getElementById("startTime").value = data.startTime.replace(" ", "T");
      slots = data.slots;
      renderSlots();
    }

    function syncInputs() {
      document.querySelectorAll(".slot-title").forEach(el => {
        const i = +el.dataset.i;
        slots[i].title = el.value.trim();
      });
      document.querySelectorAll(".slot-mins").forEach(el => {
        const i = +el.dataset.i;
        slots[i].minutes = +el.value;
      });
    }

    function renderSlots() {
      const container = document.getElementById("slots");
      container.innerHTML = "";
      slots.forEach((slot, i) => {
        const el = document.createElement("div");
        el.className = "slot";
        el.draggable = true;
        el.innerHTML = `
          <input type="text" value="${slot.title}" data-i="${i}" class="slot-title"/>
          <input type="number" value="${slot.minutes}" data-i="${i}" class="slot-mins"/> min
          <button title="Delete" onclick="removeSlot(${i})">🗑️</button>
        `;
        addDragEvents(el, i);
        container.appendChild(el);
      });
    }

    function addSlot() {
      syncInputs();
      slots.push({ title: "New Slot", minutes: 5 });
      renderSlots();
    }

    function removeSlot(i) {
      syncInputs();
      slots.splice(i, 1);
      renderSlots();
    }

    function addDragEvents(el, i) {
      el.addEventListener("dragstart", e => {
        e.dataTransfer.setData("text/plain", i);
        el.classList.add("dragging");
      });
      el.addEventListener("dragend", () => el.classList.remove("dragging"));
      el.addEventListener("dragover", e => e.preventDefault());
      el.addEventListener("drop", e => {
        e.preventDefault();
        syncInputs();
        const from = e.dataTransfer.getData("text/plain");
        const to = i;
        const moved = slots.splice(from, 1)[0];
        slots.splice(to, 0, moved);
        renderSlots();
      });
    }

    async function saveAgenda() {
      syncInputs();
      const title = document.getElementById("title").value.trim();
      const startTime = document.getElementById("startTime").value.replace("T", " ");
      const body = { title, startTime, slots };

      let url = "", method = "POST";
      if (isNew) url = "create_agenda.php";
      else url = `save_agenda.php?id=${id}&key=${key}`;

      const res = await fetch(url, {
        method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const json = await res.json();

      if (json.success) {
        if (isNew) {
          showSuccessModal(json.viewUrl, json.adminUrl);
        } else {
          alert("✅ Agenda saved successfully");
        }
      } else {
        alert(`❌ ${json.error || "Unknown error"}`);
      }
    }

    function copyToClipboard(id) {
      const input = document.getElementById(id);
      input.select();
      input.setSelectionRange(0, 99999);
      navigator.clipboard.writeText(input.value);
      const btn = input.nextElementSibling;
      const oldText = btn.textContent;
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = oldText, 1000);
    }

    function showSuccessModal(viewUrl, adminUrl) {
      const modal = document.getElementById("successModal");
      document.getElementById("viewLink").value = viewUrl;
      document.getElementById("adminLink").value = adminUrl;
      modal.style.display = "flex";
      document.getElementById("closeModal").onclick = () => {
        modal.style.display = "none";
        location.href = adminUrl; // optional redirect
      };
    }

    document.getElementById("addSlot").onclick = addSlot;
    document.getElementById("saveBtn").onclick = saveAgenda;

    loadAgenda();
  </script>
</body>
</html>
